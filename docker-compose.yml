version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:7860" # Expose the internal 7860 uvicorn port to 8000 on the host
    env_file:
      - .env
    restart: unless-stopped
    # The default CMD in Dockerfile starts uvicorn on port 7860

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501" # Expose Streamlit on port 8501
    env_file:
      - .env
    environment:
      # The Streamlit container uses this environment variable to communicate 
      # with the FastAPI container internally over the Docker network
      - API_BASE_URL=http://api:7860
    command: ["streamlit", "run", "app_streamlit.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    depends_on:
      - api
    restart: unless-stopped
